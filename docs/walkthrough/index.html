<style>
/* M9 garden-warm skin: this console keeps a charcoal panel (dark is

:root{
  --bg:#2B2B28;
  --panel:#35342F;
  --panel-2:#2F2E2A;
  --ink:#EDE8DA;
  --ink-dim:#B9B3A2;
  --teal:#2E7D4F;
  --teal-2:#5DCAA5;
  --amber:#E8B54A;
  --red:#FF6B6B;
  --green:#4ADE80;
  --line:rgba(237,232,218,.14);
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden}
body{display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#2F2E2A,#2B2B28)}
header .brand{display:flex;align-items:center;gap:12px;font-weight:600}
header .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--teal-2);box-shadow:0 0 12px var(--teal-2)}
header .meta{font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:18px 28px;min-height:0}
.pane{background:var(--panel);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.pane .pane-head{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--panel-2);font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
.pane .pane-head .traffic{display:flex;gap:6px}
.pane .pane-head .traffic span{width:11px;height:11px;border-radius:50%}
.pane .pane-head .traffic .r{background:#FF5F57}
.pane .pane-head .traffic .y{background:#FEBC2E}
.pane .pane-head .traffic .g{background:#28C840}
.pane .pane-head .title{flex:1}
.pane .pane-body{flex:1;padding:18px;overflow:auto;font-family:var(--mono);font-size:13px;line-height:1.55;color:var(--ink)}
.pane.terminal .pane-body{background:#04111301;white-space:pre-wrap}
.pane.browser .pane-body{font-family:var(--sans);font-size:14px;background:#21211E}
.cursor{display:inline-block;width:8px;height:14px;background:var(--teal-2);vertical-align:-2px;animation:blink 1s steps(2) infinite}
@keyframes blink{50%{opacity:0}}
.line-prompt{color:var(--teal-2)}
.line-out{color:var(--ink)}
.line-dim{color:var(--ink-dim)}
.line-ok{color:var(--green)}
.line-warn{color:var(--amber)}
.line-err{color:var(--red)}
.line-key{color:var(--teal-2)}
.btn{cursor:pointer;background:var(--teal);color:white;border:1px solid var(--teal-2);padding:8px 14px;border-radius:6px;font-family:var(--sans);font-size:13px;font-weight:500}
.btn:hover{background:var(--teal-2);color:#2B2B28}
.btn.secondary{background:transparent;color:var(--ink);border-color:var(--line)}
.btn.secondary:hover{background:var(--panel-2)}
footer{display:flex;align-items:center;gap:14px;padding:14px 28px;border-top:1px solid var(--line);background:#2F2E2A}
footer .step-info{flex:1;display:flex;flex-direction:column;gap:2px}
footer .step-info .title{font-weight:600;color:var(--ink)}
footer .step-info .desc{font-size:13px;color:var(--ink-dim)}
footer .progress{display:flex;gap:4px;align-items:center}
footer .progress .dot{width:10px;height:10px;border-radius:50%;background:#4A4840;cursor:pointer}
footer .progress .dot.active{background:var(--teal-2);box-shadow:0 0 6px var(--teal-2)}
footer .progress .dot.done{background:var(--teal)}
footer .nav{display:flex;gap:8px}
.kbd{display:inline-block;padding:1px 6px;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--ink-dim);background:#21211E}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;background:var(--teal);color:white;font-size:11px;font-family:var(--mono)}
.badge.warn{background:#57431A;color:var(--amber)}
.badge.ok{background:#0F5132;color:var(--green)}
.diagram{font-family:var(--mono);font-size:11px;line-height:1.35;color:var(--ink);white-space:pre;padding:8px 0}
.fake-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;margin-top:8px}
.fake-table th,.fake-table td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--line)}
.fake-table th{color:var(--ink-dim);font-weight:500;background:#2F2E2A}
.tag-yes{color:var(--green);font-weight:600}
.tag-steady{color:var(--amber);font-weight:600}
.tag-recover{color:var(--red);font-weight:600}
.ext-pop{max-width:340px;background:white;color:#2B2B28;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.6);padding:14px;font-family:var(--sans);font-size:13px}
.ext-pop h4{margin:0 0 10px;color:#1F5E3A;font-size:14px}
.ext-pop .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee}
.ext-pop .row:last-child{border:none}
.url-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);background:#2F2E2A;font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
.url-bar .pill{display:inline-flex;align-items:center;gap:6px;background:#21211E;border:1px solid var(--line);border-radius:14px;padding:4px 10px;flex:1}
.url-bar .pill .lock{color:var(--teal-2)}
.json-key{color:#5DCAA5}
.json-str{color:#E8B54A}
.json-num{color:#E07A2A}
.json-bool{color:var(--green)}
.no-net-banner{position:fixed;bottom:80px;right:20px;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:8px 14px;font-size:12px;color:var(--green);font-family:var(--mono);opacity:.85}
.no-net-banner .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);margin-right:6px}
</style>
</head>

// =============================================================================
// Renderer
// =============================================================================
let stepIdx = 0;
let playing = false;
let playTimer = null;
const PLAY_INTERVAL_MS = 14000;

function $(id) { return document.getElementById(id); }

function renderProgress() {
  const wrap = $("progress");
  wrap.innerHTML = "";
  STEPS.forEach((s, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === stepIdx ? " active" : (i < stepIdx ? " done" : ""));
    d.title = `${i+1}. ${s.title}`;
    d.onclick = () => goto(i);
    wrap.appendChild(d);
  });
  $("step-counter").textContent = `step ${stepIdx+1} / ${STEPS.length}`;
}

function renderLeftLines(lines) {
  const body = $("left-body");
  body.innerHTML = "";
  for (const ln of lines) {
    if (ln.c === "cursor") {
      const c = document.createElement("span");
      c.className = "cursor";
      body.appendChild(c);
      continue;
    }
    const s = document.createElement("span");
    s.className = ln.c || "line-out";
    s.textContent = (ln.t || "") + "\n";
    body.appendChild(s);
  }
}

let streamCancel = null;
function renderLeftStream(lines) {
  const body = $("left-body");
  body.innerHTML = "";
  if (streamCancel) { clearTimeout(streamCancel); streamCancel = null; }
  let i = 0;
  function tick() {
    if (i >= lines.length) return;
    const ln = lines[i++];
    if (ln.c === "cursor") {
      const c = document.createElement("span");
      c.className = "cursor";
      body.appendChild(c);
      body.scrollTop = body.scrollHeight;
      streamCancel = setTimeout(tick, 10);
      return;
    }
    const s = document.createElement("span");
    s.className = ln.c || "line-out";
    s.textContent = (ln.t || "") + "\n";
    body.appendChild(s);
    body.scrollTop = body.scrollHeight;
    streamCancel = setTimeout(tick, ln.d || 0);
  }
  tick();
}

function renderLeftDiagram(text) {
  const body = $("left-body");
  body.innerHTML = "";
  const pre = document.createElement("pre");
  pre.className = "diagram";
  pre.textContent = text;
  body.appendChild(pre);
}

function renderRightDiagram(text) {
  const body = $("right-body");
  body.innerHTML = "";
  const pre = document.createElement("pre");
  pre.className = "diagram";
  pre.textContent = text;
  body.appendChild(pre);
}

function renderRightTable({head, rows}) {
  const body = $("right-body");
  body.innerHTML = "";
  const tbl = document.createElement("table");
  tbl.className = "fake-table";
  const thead = document.createElement("thead");
  const trh = document.createElement("tr");
  head.forEach(h => { const th = document.createElement("th"); th.textContent = h; trh.appendChild(th); });
  thead.appendChild(trh);
  tbl.appendChild(thead);
  const tbody = document.createElement("tbody");
  rows.forEach(r => {
    const tr = document.createElement("tr");
    r.forEach(c => { const td = document.createElement("td"); td.innerHTML = colorizeCell(c); tr.appendChild(td); });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  body.appendChild(tbl);
}

function colorizeCell(text) {
  if (typeof text !== "string") return String(text);
  if (text.startsWith("✓")) return `<span class="tag-yes">${text}</span>`;
  if (text.startsWith("△")) return `<span class="tag-steady">${text}</span>`;
  if (text.startsWith("✗")) return `<span class="tag-recover">${text}</span>`;
  return text;
}

function renderRightExtPopup({title, rows}) {
  const body = $("right-body");
  body.innerHTML = "";
  body.style.display = "flex";
  body.style.alignItems = "center";
  body.style.justifyContent = "center";
  const pop = document.createElement("div");
  pop.className = "ext-pop";
  const h = document.createElement("h4");
  h.textContent = title;
  pop.appendChild(h);
  rows.forEach(([k,v]) => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `<span style="color:#666">${k}</span><span style="font-family:var(--mono);font-size:12px">${v}</span>`;
    pop.appendChild(row);
  });
  body.appendChild(pop);
}

function renderRightJSON(text) {
  const body = $("right-body");
  body.innerHTML = "";
  body.style.display = "block";
  const pre = document.createElement("pre");
  pre.className = "diagram";
  pre.innerHTML = colorizeJSON(text);
  body.appendChild(pre);
}

function colorizeJSON(t) {
  return t
    .replace(/("[^"]+")(\s*:)/g, '<span class="json-key">$1</span>$2')
    .replace(/:(\s*)"([^"]*)"/g, ':$1<span class="json-str">"$2"</span>')
    .replace(/:(\s*)(true|false|null)/g, ':$1<span class="json-bool">$2</span>')
    .replace(/:(\s*)(\d+(\.\d+)?)/g, ':$1<span class="json-num">$2</span>');
}

function renderRightLines(lines) {
  const body = $("right-body");
  body.innerHTML = "";
  body.style.display = "block";
  const pre = document.createElement("pre");
  pre.className = "diagram";
  pre.style.whiteSpace = "pre-wrap";
  for (const ln of lines) {
    const span = document.createElement("span");
    span.className = ln.c || "line-out";
    span.textContent = (ln.t || "") + "\n";
    pre.appendChild(span);
  }
  body.appendChild(pre);
}

function render() {
  // Cancel any in-flight stream from a previous step
  if (streamCancel) { clearTimeout(streamCancel); streamCancel = null; }
  const s = STEPS[stepIdx];
  $("step-title").textContent = `${stepIdx+1}. ${s.title}`;
  $("step-desc").textContent = s.desc;
  $("left-title").textContent = s.leftTitle || "terminal";
  $("right-title").textContent = s.rightTitle || "app";

  // reset right-body style
  const rb = $("right-body"); rb.style.display = "block"; rb.style.alignItems = ""; rb.style.justifyContent = "";

  // LEFT
  if (s.leftType === "lines") renderLeftLines(s.leftContent);
  else if (s.leftType === "stream") renderLeftStream(s.leftContent);
  else if (s.leftType === "diagram") renderLeftDiagram(s.leftContent);

  // RIGHT
  if (s.rightType === "diagram") renderRightDiagram(s.rightContent);
  else if (s.rightType === "table") renderRightTable(s.rightContent);
  else if (s.rightType === "ext-popup") renderRightExtPopup(s.rightContent);
  else if (s.rightType === "json") renderRightJSON(s.rightContent);
  else if (s.rightType === "lines") renderRightLines(s.rightContent);

  renderProgress();
}

function goto(i) {
  stepIdx = Math.max(0, Math.min(STEPS.length - 1, i));
  render();
}

function next() { goto(stepIdx + 1); }
function prev() { goto(stepIdx - 1); }
function togglePlay() {
  playing = !playing;
  $("play").textContent = playing ? "⏸ Pause" : "▶ Play";
  if (playing) {
    playTimer = setInterval(() => {
      if (stepIdx >= STEPS.length - 1) {
        playing = false; $("play").textContent = "▶ Play"; clearInterval(playTimer); return;
      }
      next();
    }, PLAY_INTERVAL_MS);
  } else if (playTimer) {
    clearInterval(playTimer);
  }
}

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next(); }
  else if (e.key === "ArrowLeft") prev();
  else if (e.key === "p" || e.key === "P") togglePlay();
  else if (e.key === "Home") goto(0);
  else if (e.key === "End") goto(STEPS.length - 1);
});

$("next").onclick = next;
$("prev").onclick = prev;
$("play").onclick = togglePlay;

render();
</script>
