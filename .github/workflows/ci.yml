name: ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly run that also exercises the gated scale layer.
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  server:
    name: server (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm install --no-audit --no-fund
      # `npm test` uses node --test auto-discovery, which runs unit, E2E,
      # and chaos suites under server/test (works on Node 20 and 22).
      - run: npm test

  python:
    name: python tests (unit + E2E + chaos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Python E2E spawns the Node server as a subprocess, so we need both
      # runtimes available and the server's dependencies installed.
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm install --no-audit --no-fund
        working-directory: server
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      # Excludes the gated scale layer (pytest.ini sets -m "not scale").
      - run: python -m pytest -v

  scale:
    name: python scale (gated)
    # Only on manual dispatch or the weekly schedule — not on every PR.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest -m scale tests/scale -v

  studio:
    name: studio build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: studio/package-lock.json
      # `npm ci` needs the lockfile, and so did the cache line above — which is why this job
      # failed at setup-node with "Some specified paths were not resolved": studio/package-lock.json
      # had never been committed. `npm install` also resolved fresh versions on every run, so the
      # thing CI built was not necessarily the thing anyone had tested.
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  docker:
    name: docker image
    runs-on: ubuntu-latest
    needs: [server, studio]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: aigovops/beacon:ci
