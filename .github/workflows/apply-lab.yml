        run: |
          rm -f audit/keys/private-key.pem
          rm -f audit/audit-log-after-a.jsonl audit/audit-log-after-b.jsonl
          rm -f audit/audit-log-after-c.jsonl audit/audit-log-after-d.jsonl
          rm -f apply.sh APPLY.md .gitignore-additions
          rm -f published-lab.html published-lab-offline.html
          rm -f diagnostic.html slides.html verification-report.html
      - name: Commit and push
        run: |
          git config user.name "bobrapp"
          git config user.email "bobrapp@hotmail.com"
          git add -A
          git commit -m "feat(lab): Framework Lab for AiGovOps Auditors"
          git push origin main
