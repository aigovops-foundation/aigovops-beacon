        run: |
          tar -xzf /tmp/lab.tar.gz
          rm /tmp/lab.tar.gz
          echo "Extracted. File count:"
          find . -newer .git -type f | wc -l
      - name: Set correct audit log (5 build entries)
        run: |
          cp audit/audit-log-after-d.jsonl audit/audit-log.jsonl
          echo "Audit log set to 5 entries (the build chain)"
      - name: Update .gitignore
        run: |
          grep -qxF "audit/keys/private-key.pem" .gitignore || \
          printf "\n# AiGovOps Foundation audit logger — private key NEVER committed\naudit/keys/private-key.pem\n" >> .gitignore
