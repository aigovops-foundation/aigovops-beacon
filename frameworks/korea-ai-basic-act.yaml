framework_id: korea-ai-basic-act
full_name: Act on the Development of Artificial Intelligence and Establishment of Trust Foundation
short_name: AI Basic Act
issuing_body: Ministry of Science and ICT (Republic of Korea)
jurisdiction: South Korea
status: in_force
effective_date: '2026-01-22'
scope_summary: This act establishes South Korea’s national AI governance framework, including a presidential AI committee,
  policy support bodies, learning-data policies, trust and safety measures, and rules for high-impact and generative AI. It
  applies broadly to AI activities affecting the domestic market or users, including some extraterritorial conduct, while
  excluding AI developed and used solely for national defense or national security as prescribed by Presidential Decree.
primary_url: https://law.go.kr/lsInfoP.do?lsiSeq=268543&lsId=014820&chrClsCd=&urlMode=engLsInfoR&viewCls=engLsInfoR&efYd=20260122&vSct=%EC%9D%B8%EA%B3%B5%EC%A7%80%EB%8A%A5&ancYnChk=
applies_to: AI developers, providers, and business operators whose activities affect the Korean market or Korean users, including
  foreign operators above applicable thresholds; the Act also creates special obligations for high-impact AI, generative AI,
  and AI systems meeting the prescribed computation threshold. State and local governments, designated committees, policy
  centers, and safety institutions are also addressed for governance and support functions.
penalties: Enforcement includes Ministerial fact-finding investigations and cease/correct orders under Article 40. Article
  42 provides criminal punishment of up to 3 years’ imprisonment or a fine up to KRW 30 million for breaching committee confidentiality,
  and Article 43 provides administrative fines up to KRW 30 million for certain notice, domestic-agent, and order-compliance
  failures.
