framework_id: brazil-pl-2338-2023-lgpd
full_name: Projeto de Lei nº 2.338, de 2023 (Marco Legal da Inteligência Artificial) and Lei nº 13.709/2018 (Lei Geral de
  Proteção de Dados Pessoais - LGPD)
short_name: Brazil AI Bill / LGPD
issuing_body: Brazilian National Congress (PL 2338/2023); Presidency of the Republic / National Data Protection Authority
  (LGPD)
jurisdiction: Brazil
status: draft
effective_date: TBD — draft
scope_summary: PL 2338/2023 is Brazil’s federal AI bill and, as reflected on the Senate’s official page, it was approved by
  the Senate in substitute form and sent to the Câmara dos Deputados for revision, so it is not yet in force as law. The bill
  covers general AI governance, high-risk systems, impact assessments, human oversight, auditability, and liability themes
  for AI systems used in Brazil. The LGPD is Brazil’s in-force federal personal data law and applies broadly to processing
  of personal data in Brazil or targeting individuals in Brazil, including AI systems that process personal data, make automated
  decisions, or rely on sensitive data.
primary_url: https://www25.senado.leg.br/web/atividade/materias/-/materia/157233
applies_to: PL 2338/2023 applies to AI systems and related providers/deployers in Brazil, especially systems categorized as
  high risk, generative AI where covered, and uses affecting rights, safety, or public interests. LGPD applies to any natural
  person, public entity, or private legal entity processing personal data in Brazil or targeting individuals in Brazil, across
  all sectors and organization sizes.
penalties: PL 2338/2023 is still draft/proposed in the Senate track and the Senate page does not yet state a final enforcement
  regime because it has not become law. LGPD enforcement is by the ANPD and can include warnings, public disclosure, blocking
  or deletion of data, suspension of processing activity, and fines of up to 2% of Brazilian revenue capped at R$50 million
  per infraction.
sources:
