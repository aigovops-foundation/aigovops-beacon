  url: https://www.gov.br/anpd/pt-br/centrais-de-conteudo/brazilian-data-protection-law.pdf
- title: ANPD LGPD English PDF
  url: https://www.gov.br/anpd/pt-br/centrais-de-conteudo/outros-documentos-e-publicacoes-institucionais/lgpd-en-lei-no-13-709-capa.pdf
controls:
- id: ART-1
  statement: AI systems must be used in a way that respects fundamental rights, democratic values, human dignity, and the
    objectives stated in the bill's general principles.
  evidence_types:
  - policy_document
  - ai_principles_statement
  - board_approval
  severity: high
  weight: 8
- id: ART-3
  statement: Organizations must classify AI use cases by risk and apply the corresponding governance obligations for limited-risk
    and high-risk systems.
  evidence_types:
  - risk_register
  - use_case_classification
  - control_mapping
  severity: high
  weight: 9
- id: ART-15
  statement: High-risk AI systems must meet the bill's conditioning requirements before deployment and ongoing use.
  evidence_types:
  - risk_assessment
  - deployment_approval
  - high_risk_control_checklist
  severity: critical
  weight: 10
- id: ART-18
  statement: Providers and deployers must perform or maintain the evaluation requirements applicable to the AI system, including
    impact-oriented assessment where required.
  evidence_types:
  - impact_assessment
  - review_records
  - model_card
  severity: high
  weight: 9
- id: ART-19
  statement: Affected persons must receive the protections and procedural rights established for AI decisions and risk management
    in the bill.
  evidence_types:
  - notice_text
  - grievance_procedure
  - rights_request_log
  severity: high
  weight: 8
- id: ART-25
  statement: AI governance documentation and accountability measures must be maintained in the format required by the substitute
    text, including evidence of controls and responsibilities.
  evidence_types:
  - governance_policy
  - control_ownership_matrix
  - audit_trail
  severity: medium
  weight: 7
- id: ART-34
  statement: Where the bill shifts the burden of proof or creates consumer/individual protection rules, the organization must
    preserve records sufficient to defend its compliance position.
  evidence_types:
  - litigation_hold
  - evidence_repository
  - incident_log
  severity: high
  weight: 8
- id: ART-40
  statement: Governance obligations for AI systems must be implemented and monitored continuously, not only at launch.
  evidence_types:
  - monitoring_dashboard
  - periodic_review_minutes
  - control_testing
  severity: medium
  weight: 7
- id: ART-44
  statement: High-risk AI systems must include human supervision and auditability measures as reflected in the Senate substitute
    text.
  evidence_types:
  - human_oversight_procedure
  - audit_log
  - access_controls
  severity: high
  weight: 9
- id: LGPD-PRINCIPLES
  statement: Personal data processed by AI must comply with LGPD principles including purpose, adequacy, necessity, transparency,
    security, prevention, nondiscrimination, accountability, and responsibility.
  evidence_types:
  - privacy_policy
  - data_mapping
  - security_controls
  severity: critical
  weight: 10
lang: en
