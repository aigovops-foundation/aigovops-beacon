framework_id: oecd-ai-principles
full_name: Recommendation of the Council on Artificial Intelligence
short_name: OECD AI Principles
issuing_body: Organisation for Economic Co-operation and Development (OECD) Council
jurisdiction: Global / international (OECD Adherents and non-Adherents invited to take account)
status: voluntary
effective_date: 22 May 2019; revised 3 May 2024
scope_summary: This OECD Recommendation sets out principles for trustworthy AI and policy guidance for governments and AI
  actors. It applies across sectors and AI system lifecycles, focusing on responsible stewardship, human rights, transparency,
  robustness, accountability, and international interoperability rather than sector-specific mandates.
primary_url: https://legalinstruments.oecd.org/api/print?ids=648&lang=en
applies_to: OECD member countries, adhering partner economies, and non-member jurisdictions invited to take account of the
  Recommendation; also used as a reference by AI developers, deployers, suppliers, users, and policymakers across sectors
  and organization sizes.
penalties: No legal penalties or fines are specified because the instrument is non-binding. OECD Council Recommendations operate
  as political commitments with peer-pressure, monitoring, and reporting; the 2024 revision notes implementation review by
  the OECD Digital Policy Committee, but no maximum penalty applies.
sources:
- title: OECD Legal Instruments
  url: https://legalinstruments.oecd.org/api/print?ids=648&lang=en
- title: OECD AI Principles
  url: https://www.oecd.org/en/topics/ai-principles.html
- title: OECD 2024 press release
  url: https://www.oecd.org/en/about/news/press-releases/2024/05/oecd-updates-ai-principles-to-stay-abreast-of-rapid-technological-developments.html
controls:
- id: '1.1'
  statement: AI stakeholders should proactively engage in responsible stewardship of trustworthy AI to pursue beneficial outcomes
    for people and the planet, including inclusive growth, well-being, sustainable development, and environmental sustainability.
  evidence_types:
  - ai_policy
  - sustainability_impact_assessment
  - stakeholder_engagement_record
  severity: medium
  weight: 6
- id: '1.2'
  statement: AI actors should respect the rule of law, human rights, democratic and human-centred values throughout the AI
    system lifecycle and implement mechanisms and safeguards for human agency and oversight.
  evidence_types:
  - human_rights_assessment
  - oversight_procedure
  - risk_register
  severity: high
  weight: 9
- id: '1.3'
  statement: AI actors should commit to transparency and responsible disclosure, providing meaningful information about AI
    system capabilities, limitations, data sources, logic, and avenues to challenge outputs where appropriate.
  evidence_types:
  - model_card
  - disclosure_notice
  - explainability_documentation
  severity: high
  weight: 8
- id: '1.4'
  statement: AI systems should be robust, secure, and safe throughout their lifecycle, with mechanisms to override, repair,
    or decommission systems safely if they risk causing undue harm or undesired behaviour.
  evidence_types:
  - security_testing_results
  - safety_case
  - incident_response_plan
  severity: critical
  weight: 10
- id: '1.5'
  statement: AI actors should be accountable for the proper functioning of AI systems and compliance with the principles,
    including traceability of datasets, processes, and decisions across the lifecycle.
  evidence_types:
  - traceability_log
  - audit_trail
  - accountability_matrix
  severity: high
  weight: 9
- id: '2.1'
  statement: Governments should consider long-term public investment and encourage private investment in AI R&D, open science,
    open-source tools, and representative open datasets that respect privacy and data protection.
  evidence_types:
  - funding_program
  - research_strategy
  - open_data_governance
  severity: medium
  weight: 5
- id: '2.3'
  statement: Governments should promote an agile, interoperable governance and policy environment for AI, including experimentation,
    outcome-based approaches, and cross-jurisdictional cooperation.
  evidence_types:
  - regulatory_sandbox
  - policy_framework
  - interoperability_assessment
  severity: medium
  weight: 6
- id: '2.4'
  statement: Governments should build human capacity and support fair labour transition measures, including skills development,
    social dialogue, and worker support as AI is deployed.
  evidence_types:
  - workforce_plan
  - training_record
  - social_dialogue_minutes
  severity: medium
  weight: 6
- id: '2.5'
  statement: Governments should cooperate internationally to advance the principles, share AI knowledge, develop global technical
    standards, and use comparable indicators to measure AI development and deployment.
  evidence_types:
  - international_cooperation_record
  - standards_participation
  - metrics_dashboard
  severity: medium
  weight: 5
lang: en
translations: {}
