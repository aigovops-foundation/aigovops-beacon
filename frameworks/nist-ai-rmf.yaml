framework_id: nist-ai-rmf
full_name: Artificial Intelligence Risk Management Framework (AI RMF 1.0)
short_name: AI RMF
issuing_body: National Institute of Standards and Technology (NIST)
jurisdiction: United States
status: voluntary
effective_date: January 2023
scope_summary: A voluntary, cross-sector framework for organizations that design, develop, deploy, or use AI systems to manage
  AI-related risks and promote trustworthy and responsible AI. It addresses trustworthiness considerations across the AI lifecycle,
  including governance, mapping context and impacts, measurement of risks and performance, and ongoing management. It is intended
  to be adaptable across industries, organization sizes, and AI use cases.
primary_url: https://www.nist.gov/itl/ai-risk-management-framework
applies_to: Any organization that designs, develops, deploys, evaluates, or uses AI systems; applicable across sectors, organization
  sizes, and AI model types, including generative AI. It is guidance rather than a legal requirement and is meant to be adapted
  to specific use cases.
penalties: No legal penalties because the framework is voluntary; enforcement is through organizational adoption, procurement
  expectations, audit/customer requirements, or incorporation into policy and contracts.
sources:
- title: NIST AI RMF overview
  url: https://www.nist.gov/itl/ai-risk-management-framework
- title: AI RMF 1.0 PDF
  url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
- title: NIST AI RMF Playbook
  url: https://www.nist.gov/itl/ai-risk-management-framework/nist-ai-rmf-playbook
controls:
- id: GOVERN-1.1
  statement: AI-related policies, processes, procedures, and practices are established, implemented, and maintained to manage
    AI risks.
  evidence_types:
  - ai_policy
  - process_documentation
  - control_testing
  severity: high
  weight: 9
- id: GOVERN-2.1
  statement: Roles, responsibilities, and accountability for AI risk management are documented and assigned.
  evidence_types:
  - raci_matrix
  - org_chart
  - control_owner_attestation
  severity: high
  weight: 8
- id: MAP-1.1
  statement: The context in which the AI system operates, including intended purpose, benefits, stakeholders, and affected
    parties, is documented.
  evidence_types:
  - use_case_document
  - stakeholder_analysis
  - system_context_record
  severity: medium
  weight: 8
- id: MAP-2.1
  statement: Data sources, data quality, and relevant data limitations for the AI system are identified and documented.
  evidence_types:
  - data_inventory
  - data_quality_assessment
  - lineage_record
  severity: high
  weight: 8
- id: MEASURE-2.1
  statement: AI system performance and risk-related outcomes are measured using appropriate, validated methods.
  evidence_types:
  - test_results
  - validation_report
  - metric_dashboard
  severity: high
  weight: 9
- id: MEASURE-2.7
  statement: Adverse impacts, including bias and other harms, are assessed and tracked across relevant populations and contexts.
  evidence_types:
  - fairness_analysis
  - impact_assessment
  - incident_log
  severity: critical
  weight: 10
- id: MANAGE-1.1
  statement: Risk treatment actions are prioritized, assigned, and tracked to reduce AI risks to acceptable levels.
  evidence_types:
  - risk_register
  - remediation_plan
  - issue_tracker
  severity: high
  weight: 9
- id: MANAGE-2.1
  statement: Processes are in place to monitor AI systems after deployment and respond to changes, incidents, or emerging
    risks.
  evidence_types:
  - monitoring_plan
  - incident_response_procedure
  - post_deployment_review
  severity: high
  weight: 9
- id: MANAGE-3.1
  statement: Residual AI risks and tradeoffs are communicated to relevant stakeholders and decision makers.
  evidence_types:
  - risk_acceptance_record
  - management_report
  - stakeholder_comms
  severity: medium
  weight: 7
lang: en
translations: {}
