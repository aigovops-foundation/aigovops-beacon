framework_id: india-dpdp-act
full_name: The Digital Personal Data Protection Act, 2023
short_name: DPDP Act
issuing_body: Ministry of Electronics and Information Technology (Government of India); enforced by the Data Protection Board
  of India
jurisdiction: India
status: in_force
effective_date: 2023-08-11 (enactment); operative provisions implemented via notified rules / notifications
scope_summary: India's national personal data protection law for digital personal data. It applies to processing of digital
  personal data in India and to certain processing outside India when connected to offering goods or services to individuals
  in India. For AI systems, it functions as a governance baseline wherever an AI system processes personal data, requiring
  lawful basis, notice, consent management, security safeguards, breach reporting, and stronger controls for children and
  significant data fiduciaries.
primary_url: https://www.indiacode.nic.in/handle/123456789/22037?locale=en
applies_to: Any organization processing digital personal data in India; also extraterritorial processing tied to offering
  goods or services to individuals in India. In practice this covers most consumer, employee, platform, SaaS, fintech, health,
  telecom, and AI/ML systems that ingest or infer from personal data, regardless of company size; enhanced duties can apply
  to entities notified as Significant Data Fiduciaries.
penalties: Enforced by the Data Protection Board of India. The Act's Schedule sets monetary penalties up to INR 250 crore
  for failure to maintain reasonable security safeguards, INR 200 crore for breach notification failures, INR 200 crore for
  children's-data obligations, INR 150 crore for Significant Data Fiduciary obligations, INR 50 crore for any other provision,
  and INR 10,000 for breach of Data Principal duties.
sources:
