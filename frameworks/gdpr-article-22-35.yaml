framework_id: gdpr-article-22-35
full_name: Regulation (EU) 2016/679 of the European Parliament and of the Council of 27 April 2016 on the protection of natural
  persons with regard to the processing of personal data and on the free movement of such data, and repealing Directive 95/46/EC
short_name: GDPR
issuing_body: European Parliament and Council of the European Union; enforced by national data protection authorities and
  the European Data Protection Board
jurisdiction: European Union / EEA member-state implementation
status: in_force
effective_date: 25 May 2018
scope_summary: The GDPR is the EU’s general data protection law. Articles 22 and 35 are especially relevant to AI governance
  because they govern solely automated decision-making with legal or similarly significant effects and require a data protection
  impact assessment for processing that is likely to create high risk to individuals, including certain profiling-based systems.
  The rules apply to controllers and processors handling personal data in the EU context, including many AI systems that use
  personal data for scoring, ranking, eligibility, or similar decisions.
primary_url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
applies_to: Controllers and processors in the EU/EEA processing personal data; especially AI/ML systems used for profiling,
  scoring, eligibility, fraud, hiring, credit, insurance, marketing, surveillance, or any decision-making with legal or similarly
  significant effects. Applies across sectors and organization sizes, with additional sensitivity where special-category data,
  large-scale processing, or publicly accessible area monitoring is involved.
penalties: Enforced by national supervisory authorities, with administrative fines under Article 83. Infringements of Articles
  12-22 can be fined up to EUR 20 million or 4% of worldwide annual turnover, whichever is higher; related controller/processor
  obligation breaches can be fined up to EUR 10 million or 2% of worldwide annual turnover. Supervisory authorities can also
  order cessation, limitation, or other corrective measures.
sources:
- title: EUR-Lex Official Text
  url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
- title: European Commission DPIA Guidance
  url: https://commission.europa.eu/law/law-topic/data-protection/rules-business-and-organisations/obligations/when-data-protection-impact-assessment-dpia-required_en
- title: EDPB Automated Decision-Making Guidance
  url: https://www.edpb.europa.eu/our-work-tools/our-documents/guidelines/automated-decision-making-and-profiling_en
controls:
- id: Art. 22(1)
  statement: Do not subject a data subject to a decision based solely on automated processing, including profiling, that produces
    legal effects or similarly significantly affects the person, unless an exception applies.
  evidence_types:
  - ai_system_design_review
  - decision_logic_documentation
  - legal_basis_assessment
  severity: high
  weight: 9
- id: Art. 22(2)(a)
  statement: If relying on contract necessity, document why the automated decision is necessary for entering into or performing
    the contract.
  evidence_types:
  - legal_basis_assessment
  - contract_mapping
  - product_requirement_spec
  severity: high
  weight: 8
- id: Art. 22(2)(b)
  statement: If relying on Union or Member State law, identify the enabling law and its suitable safeguards for rights, freedoms,
    and legitimate interests.
  evidence_types:
  - legal_register
  - statutory_mapping
  - safeguard_design_review
  severity: high
  weight: 8
- id: Art. 22(2)(c)
  statement: If relying on explicit consent, capture and retain proof of valid explicit consent before the automated decision
    is applied.
  evidence_types:
  - consent_log
  - ui_screenshot
  - consent_text
  severity: high
  weight: 8
- id: Art. 22(3)
  statement: Provide suitable safeguards for exceptions, including human intervention, the ability to express a point of view,
    and the ability to contest the decision.
  evidence_types:
  - appeals_process
  - human_review_procedure
  - user_notice
  severity: critical
  weight: 10
- id: Art. 22(4)
  statement: Do not base qualifying automated decisions on special-category personal data unless Article 9(2)(a) or 9(2)(g)
    applies and safeguards are in place.
  evidence_types:
  - data_classification_register
  - special_category_review
  - lawful_basis_analysis
  severity: critical
  weight: 10
- id: Art. 35(1)
  statement: Before processing begins, carry out a DPIA when the processing, especially using new technologies, is likely
    to result in high risk to the rights and freedoms of natural persons.
  evidence_types:
  - dpia_report
  - risk_assessment
  - project_gate_approval
  severity: high
  weight: 9
- id: Art. 35(3)(a)
  statement: Perform a DPIA for systematic and extensive evaluation of personal aspects based on automated processing, including
    profiling, when decisions produce legal effects or similarly significant effects.
  evidence_types:
  - dpia_report
  - model_use_case_document
  - profiling_analysis
  severity: critical
  weight: 10
- id: Art. 35(7)
  statement: Ensure the DPIA contains a systematic description of processing, necessity and proportionality analysis, risk
    assessment, and planned measures to address the risks.
  evidence_types:
  - dpia_template
  - risk_register
  - control_mapping
  severity: high
  weight: 9
- id: Art. 35(2),(9),(11)
  statement: Where designated, seek the DPO’s advice during the DPIA, consider data subjects’ views where appropriate, and
    review the DPIA when risks change.
  evidence_types:
  - dpo_signoff
  - stakeholder_consultation_record
  - dpia_review_log
  severity: medium
  weight: 6
lang: en
translations: {}
