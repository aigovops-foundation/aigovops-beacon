framework_id: colorado-ai-act-sb24-205
full_name: Consumer Protections for Artificial Intelligence
short_name: Colorado AI Act
issuing_body: Colorado General Assembly; enforced by the Colorado Attorney General
jurisdiction: Colorado, United States
status: in_force
effective_date: May 17, 2024 (with key AI duties effective February 1, 2026)
scope_summary: Colorado SB 24-205 regulates developers and deployers of high-risk artificial intelligence systems that make
  or substantially factor into consequential decisions affecting Colorado consumers. It requires risk management, impact assessments,
  disclosures, consumer notice and appeal rights, and reporting to the Attorney General, with separate consumer-facing disclosure
  duties for AI systems that interact with consumers.
primary_url: https://leg.colorado.gov/bills/sb24-205
applies_to: Persons doing business in Colorado that develop or deploy high-risk artificial intelligence systems; also any
  person making available an AI system intended to interact with consumers. High-risk systems are those that make or substantially
  factor into consequential decisions affecting education, employment, financial services, housing, insurance, health care,
  legal services, or essential government services. The statute generally targets business entities rather than a specific
  size threshold, though deployer reasonableness considers size and complexity.
penalties: Exclusive enforcement by the Colorado Attorney General; violations are deceptive/unfair trade practices under Colorado
  Consumer Protection Act, with no private right of action. Civil penalty exposure is up to $20,000 per violation, with additional
  penalties possible for violating court orders or injunctions.
sources:
