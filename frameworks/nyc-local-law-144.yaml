framework_id: nyc-local-law-144
full_name: New York City Local Law 144 of 2021, amending the Administrative Code of the City of New York in relation to automated
  employment decision tools
short_name: Local Law 144
issuing_body: New York City Council; enforced by the NYC Department of Consumer and Worker Protection (DCWP)
jurisdiction: New York City, United States
status: in_force
effective_date: January 1, 2023 (DCWP enforcement began July 5, 2023)
scope_summary: Local Law 144 regulates employers and employment agencies that use automated employment decision tools (AEDTs)
  to screen candidates or employees for hiring or promotion decisions in New York City. It requires an annual independent
  bias audit, public disclosure of audit results, and advance notice to affected New York City residents before an AEDT is
  used.
primary_url: https://www.nyc.gov/site/dca/about/automated-employment-decision-tools.page
applies_to: Employers and employment agencies that use AEDTs in New York City for hiring or promotion screening, including
  jobs located in NYC at least part time, fully remote roles tied to a NYC office, and employment agencies in NYC or otherwise
  connected to such NYC roles. It applies to companies of any size when the AEDT is used to substantially assist or replace
  discretionary decision-making in employment decisions affecting natural persons.
penalties: Enforced by DCWP, with civil penalties for violations of the subchapter or rules. The statute provides up to $500
  for a first violation and each additional violation on the same day, and $500 to $1,500 for each subsequent violation; each
  day of unlawful AEDT use and each notice failure is a separate violation.
sources:
