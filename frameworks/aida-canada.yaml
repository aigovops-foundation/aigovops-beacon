  url: https://www.parl.ca/Content/Bills/441/Government/C-27/C-27_1/C-27_1.PDF
- title: Innovation, Science and Economic Development Canada AIDA companion document
  url: https://ised-isde.canada.ca/site/innovation-better-canada/en/artificial-intelligence-and-data-act-aida-companion-document
