framework_id: aida-canada
full_name: Artificial Intelligence and Data Act
short_name: AIDA
issuing_body: Parliament of Canada / Government of Canada (Innovation, Science and Industry Canada)
jurisdiction: Canada
status: proposed
effective_date: TBD — draft
scope_summary: The Artificial Intelligence and Data Act (AIDA) is the proposed AI law in Bill C-27 that would regulate international
  and interprovincial trade and commerce in artificial intelligence systems. It would apply primarily to persons responsible
  for high-impact AI systems, requiring risk assessment, mitigation, monitoring, record-keeping, transparency, and reporting
  duties, and it also creates offence provisions for certain harmful or unlawful AI-related conduct.
primary_url: https://www.parl.ca/Content/Bills/441/Government/C-27/C-27_1/C-27_1.PDF
applies_to: 'Persons carrying out regulated activities in international or interprovincial trade and commerce: organizations
  that process data for AI design/development/use, or design, develop, make available for use, or manage the operation of
  AI systems. Core obligations focus on high-impact AI systems; government institutions and certain national-security controlled
  activities are excluded.'
penalties: Enforcement includes ministerial orders, mandatory audits, publication orders, and Federal Court enforceability.
  The draft also provides for administrative monetary penalties to be set by regulation, regulatory offences for contraventions
  of sections 6 to 12 and obstruction/false statements, and separate criminal offences. For offences under sections 38 and
  39, corporate fines can reach the greater of CAD 25 million or 5% of gross global revenue on indictment, or the greater
  of CAD 20 million or 4% on summary conviction; individuals face fines and possible imprisonment.
sources:
