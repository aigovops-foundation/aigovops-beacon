controls:
- id: '551.004'
  statement: Covered government agencies making an AI system available to consumers must disclose that the person is interacting
    with an artificial intelligence system before or at the time of interaction, in clear, conspicuous, plain-language form
    without dark patterns.
  evidence_types:
  - consumer_notice
  - product_ui_screenshot
  - policy_document
  - legal_review
  severity: medium
  weight: 7
- id: '551.051'
  statement: AI systems must not be intentionally developed or deployed to incite or encourage self-harm, harm to others,
    or criminal activity.
  evidence_types:
  - model_policy
  - red_team_results
  - safety_test_report
  - approval_record
  severity: critical
  weight: 10
- id: '551.053'
  statement: Government entities must not use AI systems for social scoring that evaluates or classifies people in ways that
    lead to unjustified detrimental treatment or chilling of rights.
  evidence_types:
  - use_case_inventory
  - impact_assessment
  - legal_review
  - deployment_record
  severity: high
  weight: 9
- id: '551.054'
  statement: Government entities must not develop or deploy AI systems using biometric identifiers and public-source media
    for uniquely identifying a specific individual where this would infringe or chill protected rights.
  evidence_types:
  - data_inventory
  - biometric_processing_log
  - impact_assessment
  - consent_analysis
  severity: high
  weight: 9
- id: '551.056'
  statement: AI systems must not be developed or deployed to intentionally cause political viewpoint discrimination or suppress
    protected expression.
  evidence_types:
  - content_moderation_policy
  - model_eval
  - bias_test_report
  - complaint_log
  severity: high
  weight: 9
- id: '551.058'
  statement: AI systems must not be developed or deployed with the intent to unlawfully discriminate against a protected class
    under state or federal law.
  evidence_types:
  - fairness_test_report
  - training_data_review
  - legal_review
  - human_oversight_record
  severity: high
  weight: 9
- id: '551.061'
  statement: AI systems must not be developed or deployed with the sole intent of producing, assisting, or distributing unlawful
    sexual material or unlawful deepfake content.
  evidence_types:
  - model_scope_statement
  - safety_test_report
  - marketing_review
  - terms_of_use
  severity: critical
  weight: 10
- id: 551.105(b)(1)(C)
  statement: To preserve the affirmative defense, a developer or deployer must identify and cure violations using feedback,
    testing such as adversarial testing or red-teaming, internal review, and compliance with NIST AI RMF, ISO/IEC 42001, or
    another recognized AI risk management framework.
  evidence_types:
  - red_team_report
  - internal_audit
  - framework_mapping
  - corrective_action_plan
  severity: high
  weight: 8
- id: '551.106'
  statement: The Attorney General may seek injunctive relief and civil penalties for uncured or uncureable violations, with
    specified fine ranges per violation and per day of continuing violation.
  evidence_types:
  - investigation_file
  - notice_of_violation
  - cure_response
  - penalty_assessment
  severity: high
  weight: 8
- id: '552.102'
  statement: Sandbox participants must file quarterly reports on performance metrics, risk mitigation updates, and consumer
    or stakeholder feedback, and the department must issue an annual report to the legislature.
  evidence_types:
  - quarterly_report
  - metrics_dashboard
  - stakeholder_feedback
  - annual_report
  severity: medium
  weight: 6
lang: en
