framework_id: texas-responsible-ai-governance-act
full_name: Texas Responsible Artificial Intelligence Governance Act
short_name: TRAIGA
issuing_body: Texas Legislature; enforced by the Texas Attorney General and related state agencies
jurisdiction: Texas, United States
status: proposed
effective_date: January 1, 2026
scope_summary: Proposed Texas state legislation governing the development, deployment, disclosure, testing, and enforcement
  of artificial intelligence systems used by covered businesses, deployers, developers, and certain state agencies in Texas.
  It establishes consumer disclosure duties, prohibited AI uses, a regulatory sandbox, a Texas Artificial Intelligence Council,
  and Attorney General enforcement with civil penalties and injunctive relief.
primary_url: https://capitol.texas.gov/tlodocs/89R/billtext/pdf/HB00149I.pdf
applies_to: Persons or business entities that promote, advertise, or conduct business in Texas; produce products or services
  used by Texas residents; or develop or deploy AI systems in Texas. The bill also applies to certain Texas government agencies,
  and it creates a sandbox for innovative AI testing with limited exemptions. It is broad across sectors, including healthcare,
  finance, education, and public services, with specific heightened restrictions for government uses and consumer-facing interactions.
penalties: Enforced primarily by the Texas Attorney General through civil investigative demands, injunctions, and civil actions.
  Civil penalties include $10,000-$12,000 per uncured violation, $80,000-$200,000 per uncurable violation, and $2,000-$40,000
  per day for continuing violations; state agency sanctions may include suspension, probation, revocation, and monetary penalties
  up to $100,000.
sources:
