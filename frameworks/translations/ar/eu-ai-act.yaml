framework_id: eu-ai-act
lang: ar
translation_status: human_verified
full_name: لائحة الاتحاد الأوروبي 2024/1689 الصادرة عن البرلمان الأوروبي والمجلس بتاريخ 13 يونيو 2024، التي تضع قواعد موحَّدة
  بشأن الذكاء الاصطناعي وتعدّل اللوائح رقم 300/2008 و167/2013 و168/2013 و2018/858 و2018/1139 و2019/2144، والتوجيهات 2014/90/EU
  و2016/797 و2020/1828 (قانون الذكاء الاصطناعي) (نص ذو صلة بالمنطقة الاقتصادية الأوروبية)
short_name: EU AI Act
scope_summary: قانون الذكاء الاصطناعي للاتحاد الأوروبي هو قانون الذكاء الاصطناعي الأفقي للاتحاد الأوروبي، الذي يضع قواعد
  موحَّدة لطرح أنظمة الذكاء الاصطناعي في السوق وتشغيلها واستخدامها. يحظر القانون بعض الممارسات ذات المخاطر غير المقبولة،
  ويفرض التزامات تفصيلية على أنظمة الذكاء الاصطناعي عالية المخاطر ونماذج الذكاء الاصطناعي للأغراض العامة، ويضيف متطلبات
  للشفافية والحوكمة ومراقبة السوق والإنفاذ على مقدمي الخدمات والمنشرين والمستوردين والموزعين وغيرهم من المشغلين.
applies_to: مقدمو الخدمات، والمنشرون، والمستوردون، والموزعون، ومصنّعو المنتجات، والممثلون المعتمدون، والمشغلون المتأثرون
  لأنظمة الذكاء الاصطناعي في الاتحاد الأوروبي؛ ولا سيما أنظمة الذكاء الاصطناعي عالية المخاطر ومقدمو نماذج الذكاء الاصطناعي
  للأغراض العامة. يمتد النطاق أيضًا إلى ممارسات معينة للذكاء الاصطناعي بصرف النظر عن القطاع، إضافةً إلى السلطات العامة وبعض
  المشغلين من دول ثالثة عندما تُستخدم مخرجاتهم داخل الاتحاد الأوروبي.
penalties: يجري الإنفاذ من خلال السلطات الوطنية المختصة ومراقبة السوق، مع غرامات بموجب المادة 99 قد تصل إلى 35 مليون يورو
  أو 7٪ من إجمالي رقم الأعمال السنوي العالمي عن الممارسات المحظورة للذكاء الاصطناعي، وحتى 15 مليون يورو أو 3٪ عن المخالفات
  الأخرى، وحتى 7.5 مليون يورو أو 1.5٪ عن المعلومات غير الصحيحة أو غير المكتملة؛ وتنص المادة 101 على غرامات منفصلة لمقدمي
  نماذج الذكاء الاصطناعي للأغراض العامة، وتضع المادة 100 غرامات لمؤسسات الاتحاد الأوروبي وهيئاته.
controls:
  - id: Art. 9
    severity: high
    weight: 10
    statement: يجب على مقدمي أنظمة الذكاء الاصطناعي عالية المخاطر إنشاء نظام لإدارة المخاطر وتنفيذه وتوثيقه والحفاظ عليه عبر
      دورة حياة الذكاء الاصطناعي، بما في ذلك الاختبار التكراري وتخفيف المخاطر المحدَّدة.
  - id: Art. 10
    severity: high
    weight: 9
    statement: يجب أن تستخدم أنظمة الذكاء الاصطناعي عالية المخاطر ممارسات بيانات وحوكمة بيانات تضمن أن تكون بيانات التدريب
      والتحقق والاختبار ذات صلة وممثِّلة وخالية من الأخطاء قدر الإمكان وملائمة للغرض المقصود.
  - id: Art. 11
    severity: high
    weight: 8
    statement: يجب على مقدمي الخدمات إعداد التوثيق التقني والحفاظ على تحديثه قبل طرح نظام ذكاء اصطناعي عالي المخاطر في السوق
      أو تشغيله.
  - id: Art. 12
    severity: high
    weight: 8
    statement: يجب أن تُصمَّم أنظمة الذكاء الاصطناعي عالية المخاطر وتُطوَّر بقدرات تسجيل تلقائية تتيح إمكانية تتبع التشغيل
      والأحداث لأغراض الرقابة وما بعد طرحها في السوق.
  - id: Art. 13
    severity: medium
    weight: 7
    statement: يجب على مقدمي الخدمات ضمان أن تكون أنظمة الذكاء الاصطناعي عالية المخاطر مصحوبة بتعليمات ومعلومات واضحة للمنشرين
      تغطي الغرض المقصود والقدرات والقيود والاستخدام السليم.
  - id: Art. 14
    severity: high
    weight: 8
    statement: يجب أن تُصمَّم أنظمة الذكاء الاصطناعي عالية المخاطر وتُطوَّر بحيث يمكن للأشخاص الطبيعيين الإشراف عليها بفعالية
      أثناء الاستخدام.
  - id: Art. 15
    severity: critical
    weight: 10
    statement: يجب أن تحقق أنظمة الذكاء الاصطناعي عالية المخاطر مستوى مناسبًا من الدقة والمتانة والأمن السيبراني، وأن يتم
      التحقق من هذه الخصائص والحفاظ عليها.
  - id: Art. 27
    severity: high
    weight: 9
    statement: يجب على منشري بعض أنظمة الذكاء الاصطناعي عالية المخاطر إجراء تقييم لأثرها على الحقوق الأساسية قبل الاستخدام
      الأول وتوثيق المخاطر المتبقية وتدابير التخفيف.
  - id: Art. 72
    severity: high
    weight: 9
    statement: يجب على مقدمي أنظمة الذكاء الاصطناعي عالية المخاطر إنشاء نظام وخطة لمتابعة ما بعد طرح المنتج في السوق والحفاظ
      عليهما، لجمع وتوثيق وتحليل معلومات الأداء والحوادث بشكل فعّال بعد النشر.
  - id: Art. 99
    severity: critical
    weight: 10
    statement: يجب على الدول الأعضاء وضع عقوبات فعّالة ومتناسبة ورادعة لمخالفات اللائحة وضمان توافر آليات الإنفاذ.
