framework_id: nist-ai-rmf
lang: ar
translation_status: human_verified
full_name: إطار إدارة مخاطر الذكاء الاصطناعي (AI RMF 1.0)
short_name: AI RMF
scope_summary: إطار طوعي وعابر للقطاعات موجَّه إلى المنظمات التي تصمم أنظمة الذكاء الاصطناعي أو تطوّرها أو تنشرها أو تستخدمها،
  بهدف إدارة المخاطر المرتبطة بالذكاء الاصطناعي وتعزيز ذكاء اصطناعي موثوق ومسؤول. يعالج اعتبارات الجدارة بالثقة عبر دورة
  حياة الذكاء الاصطناعي بأكملها، بما في ذلك الحوكمة، وتحديد السياق والآثار، وقياس المخاطر والأداء، والإدارة المستمرة. وهو
  مصمَّم ليكون قابلًا للتكيّف عبر القطاعات وأحجام المنظمات وحالات استخدام الذكاء الاصطناعي.
applies_to: أي منظمة تصمم أنظمة الذكاء الاصطناعي أو تطوّرها أو تنشرها أو تقيّمها أو تستخدمها؛ ينطبق عبر القطاعات وأحجام المنظمات
  وأنواع نماذج الذكاء الاصطناعي، بما في ذلك الذكاء الاصطناعي التوليدي. وهو إرشادي وليس متطلبًا قانونيًا، ومن المتوقع تكييفه
  مع حالات الاستخدام المحددة.
penalties: لا توجد عقوبات قانونية لأن الإطار طوعي؛ ويتم تعزيز الالتزام من خلال التبني المؤسسي، وتوقعات المشتريات، ومتطلبات
  التدقيق أو العملاء، أو إدراجه في السياسات والعقود.
controls:
  - id: GOVERN-1.1
    severity: high
    weight: 9
    statement: يتم وضع السياسات والعمليات والإجراءات والممارسات المتعلقة بالذكاء الاصطناعي وتنفيذها والحفاظ عليها لإدارة مخاطر
      الذكاء الاصطناعي.
  - id: GOVERN-2.1
    severity: high
    weight: 8
    statement: يتم توثيق الأدوار والمسؤوليات والمساءلة لإدارة مخاطر الذكاء الاصطناعي وتعيينها.
  - id: MAP-1.1
    severity: medium
    weight: 8
    statement: يتم توثيق السياق الذي يعمل فيه نظام الذكاء الاصطناعي، بما في ذلك الغرض المقصود والفوائد وأصحاب المصلحة والأطراف
      المتأثرة.
  - id: MAP-2.1
    severity: high
    weight: 8
    statement: يتم تحديد وتوثيق مصادر البيانات وجودة البيانات وقيود البيانات ذات الصلة بنظام الذكاء الاصطناعي.
  - id: MEASURE-2.1
    severity: high
    weight: 9
    statement: يتم قياس أداء نظام الذكاء الاصطناعي والنتائج المتعلقة بالمخاطر باستخدام أساليب مناسبة ومُتحقق من صحتها.
  - id: MEASURE-2.7
    severity: critical
    weight: 10
    statement: يتم تقييم الآثار الضارة، بما في ذلك التحيّز وغيره من الأضرار، وتتبعها عبر الفئات السكانية والسياقات ذات الصلة.
  - id: MANAGE-1.1
    severity: high
    weight: 9
    statement: تُحدَّد أولويات إجراءات معالجة المخاطر وتُسنَد ويتم تتبعها لخفض مخاطر الذكاء الاصطناعي إلى مستويات مقبولة.
  - id: MANAGE-2.1
    severity: high
    weight: 9
    statement: توجد عمليات لرصد أنظمة الذكاء الاصطناعي بعد النشر والاستجابة للتغيرات أو الحوادث أو المخاطر الناشئة.
  - id: MANAGE-3.1
    severity: medium
    weight: 7
    statement: يتم إبلاغ المخاطر المتبقية للذكاء الاصطناعي والمفاضلات ذات الصلة إلى أصحاب المصلحة وصانعي القرار المعنيين.
