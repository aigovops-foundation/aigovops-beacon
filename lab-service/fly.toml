# Fly.io app configuration for Beacon Lab backend.
# Deploy: see docs/deploy-fly.md
app = "aigovops-beacon-lab"
primary_region = "sea"

[build]
  # Use the multi-stage Dockerfile in this directory.
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"

# Persistent SQLite volume — mounted at /data so the DB survives deploys.
# Create with: flyctl volumes create beacon_data --size 1 --region sea
[[mounts]]
  source = "beacon_data"
  destination = "/data"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # Health check — Express serves /api/status with no auth required.
  [http_service.checks]
    [http_service.checks.alive]
      grace_period = "10s"
      interval = "30s"
      method = "GET"
      path = "/api/status"
      timeout = "5s"
