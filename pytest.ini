[pytest]
# Test discovery is rooted at tests/. Layers are separated by directory:
#   tests/unit   — pure functions: canonicalization, signing, receipt build
#   tests/e2e    — full server round-trips against the Beacon HTTP API
#   tests/scale  — 10k+ receipt throughput; gated behind RUN_SCALE / -m scale
#   tests/chaos  — input fuzzing (Hypothesis) and I/O failure injection
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    scale: heavy throughput/memory tests; only run in the dedicated CI job (use -m scale or RUN_SCALE=1)
    chaos: fuzzing and fault-injection tests
    e2e: end-to-end tests that boot the Beacon server

# Scale tests are excluded by default so the normal suite stays fast.
# The dedicated CI job overrides this with `-m scale`.
addopts = -m "not scale"
