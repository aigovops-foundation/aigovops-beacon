<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AiGovOps Beacon</title>
<style>
  :root {
    --teal: #01696F;
    --ink: #0E1B1C;
    --paper: #FBFAF6;
    --muted: #7A7974;
    --green: #2ECC71;
    --red: #FF5B3C;
    --border: #D4D1CA;
  }
  html, body {
    margin: 0; padding: 0;
    width: 360px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background: var(--paper);
  }
  header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  header .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green);
  }
  header h1 { margin: 0; font-size: 14px; font-weight: 600; }
  header .ver { margin-left: auto; font-size: 11px; color: var(--muted); }

  .body { padding: 12px 16px; }
  .row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; }
  .row b { font-weight: 600; }
  .muted { color: var(--muted); }
  .accent { color: var(--teal); }

  h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 16px 0 6px;
    font-weight: 600;
  }
  ul { list-style: none; margin: 0; padding: 0; max-height: 220px; overflow-y: auto; }
  li {
    font-size: 11px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; gap: 8px;
  }
  li .host { font-weight: 500; color: var(--ink); }
  li .ts { color: var(--muted); font-variant-numeric: tabular-nums; }

  footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex; justify-content: space-between;
  }
  footer a { color: var(--teal); text-decoration: none; }
  button.flush {
    background: var(--teal); color: white; border: 0;
    padding: 4px 10px; border-radius: 4px; font-size: 11px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>AiGovOps Beacon</h1>
    <span class="ver">v2.2</span>
  </header>
  <div class="body">
    <div class="row"><span class="muted">Beacon URL</span><b id="beaconUrl" class="accent">—</b></div>
    <div class="row"><span class="muted">Tenant</span><b id="tenantId">—</b></div>
    <div class="row"><span class="muted">Receipts this session</span><b id="counter">0</b></div>
    <div class="row"><span class="muted">Allowlisted hosts</span><b id="allowlistN">0</b></div>

    <h2>Recent receipts</h2>
    <ul id="recent"><li><span class="muted">none yet</span></li></ul>
  </div>
  <footer>
    <span>YES-Ship · YES-Steady · YES-Recover</span>
    <button id="flush" class="flush">Flush</button>
  </footer>
  <script src="popup.js" type="module"></script>
</body>
</html>
