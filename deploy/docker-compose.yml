# One-command deploy for a single VM. Includes an optional oauth2-proxy
# fronting Beacon so OIDC claims are injected as the X-Beacon-* headers
# the API expects.

services:
  beacon:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: aigovops/beacon:0.1.0
    container_name: beacon
    restart: unless-stopped
    environment:
      BEACON_CAPTURE_MODE: ${BEACON_CAPTURE_MODE:-redacted}
      BEACON_ENV: ${BEACON_ENV:-production}
    volumes:
      - beacon_data:/data
    expose:
      - "8787"
    networks:
      - beacon_net

  # Uncomment to put OIDC in front. Configure your IdP first.
  #
  # oauth2-proxy:
  #   image: quay.io/oauth2-proxy/oauth2-proxy:latest
  #   container_name: beacon-oauth
  #   restart: unless-stopped
  #   command:
  #     - --upstream=http://beacon:8787
  #     - --http-address=0.0.0.0:4180
  #     - --set-xauthrequest=true
  #     - --pass-access-token=true
  #     - --pass-user-headers=true
  #     - --skip-provider-button=true
  #   environment:
  #     OAUTH2_PROXY_CLIENT_ID: ${OIDC_CLIENT_ID}
  #     OAUTH2_PROXY_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
  #     OAUTH2_PROXY_COOKIE_SECRET: ${OIDC_COOKIE_SECRET}
  #     OAUTH2_PROXY_PROVIDER: oidc
  #     OAUTH2_PROXY_OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
  #     OAUTH2_PROXY_EMAIL_DOMAINS: '*'
  #   ports:
  #     - "4180:4180"
  #   depends_on:
  #     - beacon
  #   networks:
  #     - beacon_net

volumes:
  beacon_data:

networks:
  beacon_net:
